name: Build & Release (Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - 'windows-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "7.0.x"

      - name: Publish single-file exe
        run: >
          dotnet publish csharp/BoseCtl/BoseCtl.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -o out

      - name: Rename exe
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#windows-v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          mv out/quiet-rebellion.exe "quietrebellion-windows-${VERSION}-win-x64.exe"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Windows v${{ env.VERSION }}
          tag_name: ${{ github.ref_name }}
          files: quietrebellion-windows-${{ env.VERSION }}-win-x64.exe
