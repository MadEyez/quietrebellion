name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build components
        run: sdkmanager "platforms;android-35" "build-tools;34.0.0" "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode signing key
        run: |
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Build Release APK
        working-directory: android
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Show release APKs
        run: |
          ls -la android/app/build/outputs/apk/release
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs android/app/build/outputs/apk/release/*.apk || true

      - name: List APK outputs
        run: find android/app/build/outputs/apk/release -type f -name "*.apk" -print      

      - name: Rename APK
        run: |
          APK="$(find android/app/build/outputs/apk/release -type f -name "*.apk" | head -n 1)"
          echo "Found APK: $APK"
          mv "$APK" quietrebellion-${{ github.ref_name }}.apk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: quietrebellion-${{ github.ref_name }}.apk

      - name: Print F-Droid metadata values
        run: |
          echo "Commit: $GITHUB_SHA"
          echo "Tag: $GITHUB_REF_NAME"
          echo "APK: https://github.com/MadEyez/quietrebellion/releases/download/$GITHUB_REF_NAME/quietrebellion-${GITHUB_REF_NAME#v}.apk"
